<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A small utility to generate UUID's on the fly." />
    <meta name="author" content="util.uuid - by Sayed Dileri" />

    <title>UUID Utility</title>
  </head>

  <style>
    * {
      padding: 0;
      margin: 0;
    }

    a {
      text-decoration: none;
      color: rgb(105, 134, 171);
    }

    body {
      height: 100vh;
      font-family: monospace;
      padding-top: 4rem;
      display: flex;
      flex-direction: column;
      padding-inline: 2rem;
      cursor: pointer;

      &:hover {
        background-color: rgb(249, 249, 249);
      }
    }

    .no-select {
      user-select: none;
    }

    .attribute-text {
      color: rgb(165, 165, 165);
      margin-top: 4rem;
      text-align: center;
    }

    .secondary-text {
      color: gray;
      margin-top: 0.4rem;
    }

    code {
      background-color: rgb(239, 239, 239);
      margin-top: 2rem;
      padding: 1rem;
      text-align: center;
    }

    footer {
      visibility: hidden;
      background-color: rgb(39, 186, 76);
      color: white;
      padding: 0.5rem 1rem;
      font-weight: 900;
      align-self: center;
      width: fit-content;
      margin-top: 0.5rem;
    }
  </style>
  <body>
    <p class="no-select">Click anywhere in screen to copy. The UUID will change shortly after.</p>
    <p class="no-select secondary-text">Tip: if the above feature doesn't work, refresh the browser.</p>
    <code id="uuid"></code>
    <footer>Copied</footer>
    <span class="no-select attribute-text">util.uuid - by <a href="https://sayeddileri.com" target="_blank">Sayed Dileri</a></span>
  </body>

  <script>
    let activeRefreshTextTimerId = null;
    let activeToastTimerId = null;
    let uuid = crypto.randomUUID();

    const body = document.querySelector("body");
    const codeElement = document.querySelector("#uuid");
    const footer = document.querySelector("footer");

    codeElement.textContent = uuid;

    body.addEventListener("click", () => {
      footer.style.visibility = "visible";
      if (activeRefreshTextTimerId) clearTimeout(activeRefreshTextTimerId);
      if (activeToastTimerId) clearTimeout(activeToastTimerId);

      copyIntoClipboard(uuid);
    });

    async function copyIntoClipboard(text) {
      try {
        await navigator.clipboard.writeText(text).then(() => {
          activeRefreshTextTimerId = setTimeout(() => {
            uuid = crypto.randomUUID();
            codeElement.textContent = uuid;
          }, 800);

          activeToastTimerId = setTimeout(() => {
            footer.style.visibility = "hidden";
          }, 750);
        });
      } catch (error) {
        console.error(error);
      }
    }
  </script>
</html>

<!-- Tap, and boom...a fresh UUID is living in your Clipboard -->
